name: Build Linux Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxcb-cursor0 \
            libfontconfig1 libpulse0 \
            gdal-bin libgdal-dev \
            fuse libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow
          python -m pip install PyQt6 matplotlib rasterio numpy pandas scipy scikit-learn pyproj
          python -m pip install xgboost lightgbm pygam elapid geopandas shapely
          python -m pip install catboost || echo "catboost skipped"

      - name: Run PyInstaller
        run: python -m PyInstaller habitus.spec --clean -y

      - name: Show build output
        run: ls -la dist/

      - name: Create Linux distribution archive
        run: bash scripts/make_linux_archive.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HABITUS-Linux
          path: |
            HABITUS_*.tar.gz
            HABITUS_*.AppImage
          if-no-files-found: warn

      - name: Attach to release (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HABITUS_*.tar.gz
            HABITUS_*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
